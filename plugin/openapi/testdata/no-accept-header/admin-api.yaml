openapi: '3.0.3'
info:
  title: Mockscloud Admin API
  version: '1.0.0'
  description: Internal admin API for managing platform users

paths:
  /admin/users:
    get:
      operationId: listUsers
      summary: List users with pagination
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
        - name: q
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Paginated list of users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUsers'
              examples:
                default:
                  value:
                    items:
                      - user_id: 'auth0|123'
                        email: 'test@example.com'
                        name: 'Test User'
                        picture: 'https://s.gravatar.com/avatar/test'
                        email_verified: true
                        created_at: '2024-01-01T00:00:00Z'
                        last_login: '2024-06-01T00:00:00Z'
                        logins_count: 5
                    total: 1
                    page: 0
                    perPage: 20

  /admin/users/{userId}:
    get:
      operationId: getUser
      summary: Get a single user by ID
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Auth0User'
              examples:
                default:
                  value:
                    user_id: 'auth0|123'
                    email: 'test@example.com'
                    name: 'Test User'
                    picture: 'https://s.gravatar.com/avatar/test'
                    email_verified: true
                    created_at: '2024-01-01T00:00:00Z'
                    last_login: '2024-06-01T00:00:00Z'
                    logins_count: 5

components:
  schemas:
    Auth0User:
      type: object
      properties:
        user_id:
          type: string
        email:
          type: string
        name:
          type: string
        picture:
          type: string
        email_verified:
          type: boolean
        created_at:
          type: string
        last_login:
          type: string
        logins_count:
          type: integer

    PaginatedUsers:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Auth0User'
        total:
          type: integer
        page:
          type: integer
        perPage:
          type: integer
