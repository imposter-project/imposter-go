# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: CI

on:
  push:
    branches: [ "main", "build/*", "ci/*", "feat/*", "fix/*" ]
    tags: [ "v*" ]
  pull_request:

permissions:
  contents: write

jobs:

  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0  # Fetch all history for git describe

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'

    - name: Build
      run: |
        make build-plugins
        make build

    - name: Test
      run: go test -v ./...

  release:
    needs: [docker-manifest, publish-plugins]
    runs-on: ubuntu-latest-l
    timeout-minutes: 15
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'

    - name: Run GoReleaser
      uses: goreleaser/goreleaser-action@v7
      with:
        distribution: goreleaser
        version: latest
        args: release --clean
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  goreleaser-snapshot:
    needs: build
    runs-on: ubuntu-latest-l
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'

    - name: Run GoReleaser Snapshot
      uses: goreleaser/goreleaser-action@v7
      with:
        distribution: goreleaser
        version: latest
        args: release --snapshot --clean

  docker-dry-run:
    needs: build
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        platform: [linux/amd64, linux/arm64]
        image: [core, all]
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@v6

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build Docker image (dry run)
      uses: docker/build-push-action@v7
      with:
        context: .
        file: ./distro/${{ matrix.image }}/Dockerfile
        platforms: ${{ matrix.platform }}
        push: false
        build-args: |
          VERSION=dev

  publish-plugins:
    needs: build
    runs-on: ubuntu-latest-l
    timeout-minutes: 10
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'

    - name: Extract version
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Create draft release in imposter-go-plugins repo
      id: create_release
      run: |
        gh release create "v${{ steps.version.outputs.VERSION }}" \
          --repo imposter-project/imposter-go-plugins \
          --title "Plugins v${{ steps.version.outputs.VERSION }}" \
          --notes "External plugins for imposter-go ${{ steps.version.outputs.VERSION }}" \
          --draft
      env:
        GITHUB_TOKEN: ${{ secrets.PLUGIN_REPO_TOKEN }}

    - name: Build plugins for multiple platforms
      run: ./scripts/build-plugins.sh ${{ steps.version.outputs.VERSION }} dist

    - name: Upload plugin binaries as release assets
      run: |
        for file in dist/*; do
          if [ -f "$file" ]; then
            echo "Uploading $(basename "$file")"
            gh release upload "v${{ steps.version.outputs.VERSION }}" "$file" \
              --repo imposter-project/imposter-go-plugins
          fi
        done
      env:
        GITHUB_TOKEN: ${{ secrets.PLUGIN_REPO_TOKEN }}

    - name: Publish release
      run: |
        gh release edit "v${{ steps.version.outputs.VERSION }}" \
          --repo imposter-project/imposter-go-plugins \
          --draft=false
      env:
        GITHUB_TOKEN: ${{ secrets.PLUGIN_REPO_TOKEN }}

  docker-build:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        platform: [linux/amd64, linux/arm64]
        image: [core, all]
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
          - image: core
            repo: outofcoffee/imposter
          - image: all
            repo: outofcoffee/imposter-all
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Extract version
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Build and push by digest
      id: build
      uses: docker/build-push-action@v7
      with:
        context: .
        file: ./distro/${{ matrix.image }}/Dockerfile
        platforms: ${{ matrix.platform }}
        outputs: type=image,name=${{ matrix.repo }},push-by-digest=true,name-canonical=true,push=true
        build-args: |
          VERSION=${{ steps.version.outputs.VERSION }}

    - name: Export digest
      run: |
        mkdir -p /tmp/digests
        digest="${{ steps.build.outputs.digest }}"
        touch "/tmp/digests/${digest#sha256:}"

    - name: Sanitise platform for artifact name
      id: platform
      run: echo "slug=${PLATFORM//\//-}" >> $GITHUB_OUTPUT
      env:
        PLATFORM: ${{ matrix.platform }}

    - name: Upload digest
      uses: actions/upload-artifact@v7
      with:
        name: digests-${{ matrix.image }}-${{ steps.platform.outputs.slug }}
        path: /tmp/digests/*
        if-no-files-found: error
        retention-days: 1

  docker-manifest:
    needs: docker-build
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: core
            repo: outofcoffee/imposter
          - image: all
            repo: outofcoffee/imposter-all
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
    - name: Download digests
      uses: actions/download-artifact@v8
      with:
        path: /tmp/digests
        pattern: digests-${{ matrix.image }}-*
        merge-multiple: true

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Extract version
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Create manifest list and push
      working-directory: /tmp/digests
      run: |
        docker buildx imagetools create \
          -t ${{ matrix.repo }}:5-beta \
          -t ${{ matrix.repo }}:${{ steps.version.outputs.VERSION }}-beta \
          $(printf '${{ matrix.repo }}@sha256:%s ' *)
