openapi: "3.0.0"
info:
  title: User API
  description: Example API demonstrating fake data generation from OpenAPI schemas.
  version: "1.0.0"
paths:
  /users:
    get:
      summary: List users
      operationId: listUsers
      responses:
        "200":
          description: A list of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
  /users/{userId}:
    get:
      summary: Get a user by ID
      operationId: getUser
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: A single user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
  /companies/{companyId}:
    get:
      summary: Get a company by ID
      operationId: getCompany
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: A single company
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"
components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        username:
          type: string
        phone:
          type: string
        city:
          type: string
        country:
          type: string
        website:
          type: string
          format: uri
        bio:
          type: string
        favouriteColour:
          type: string
          x-fake-data: Color.name
    Company:
      type: object
      properties:
        id:
          type: integer
          example: 100
        company:
          type: string
        street:
          type: string
        city:
          type: string
        state:
          type: string
        zipCode:
          type: string
        country:
          type: string
        phone:
          type: string
        domain:
          type: string
          format: hostname
